name: CI

on:
  push:
    branches: [main, legacy]
  pull_request:

jobs:
  php-lint:
    name: PHP 8.3 lint (our code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: php -l across project code (vendored libs excluded)
        run: |
          docker run --rm -v "$PWD":/app -w /app php:8.3-cli sh -c '
            set -e
            find index.php luna/luna.php luna/luna.classes luna/luna.mods \
              -name "*.php" -print0 | xargs -0 -n1 php -l'

  compose-validate:
    name: docker-compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate the Docker stack definition
        run: docker compose config -q

  ports-loopback:
    name: ports are loopback-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if any published port is not bound to 127.0.0.1
        run: |
          # Every published host port must be loopback-bound (see SECURITY.md).
          if grep -nE '^\s*-\s*"[0-9]+:[0-9]+"' docker-compose.yml; then
            echo "::error::Found a published port not bound to 127.0.0.1"; exit 1
          fi
          echo "OK: all published ports are 127.0.0.1-bound"

  regression:
    name: smoke + security regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boot the stack (SQL reads; no triplestore needed)
        run: SPARQL_READS=0 docker compose up -d app db
      - name: Wait for the app to render
        run: |
          for i in $(seq 1 90); do
            [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/ || true)" = 200 ] && exit 0
            sleep 2
          done
          echo "::error::app did not become ready"; docker compose logs --tail=80; exit 1
      - name: Run the smoke + security-regression suite
        run: BASE=http://localhost:8080 DB_CONTAINER="$(docker compose ps -q db)" bash test/regression.sh
