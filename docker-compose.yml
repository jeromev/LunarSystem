services:
  app:
    build: .
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - .:/var/www/html
    # The read path is RDF-native by default: routing / ACL / texts are read from
    # Oxigraph (the materialised, dual-write-synced triplestore) through the
    # authenticating `sparql-proxy`. Override to Ontop to read live from MySQL through
    # virtual SPARQL instead (no app change):
    #   SPARQL_ENDPOINT=http://ontop:8080/sparql docker-compose up -d app
    # or set SPARQL_READS=0 to bypass SPARQL entirely and read from SQL.
    environment:
      # Database connection — passed to the app so a fresh clone runs with no db.ini to
      # provision (db.class.php falls back to these when db.ini is absent). Matches the db
      # service below; override via .env for a different host/credentials.
      DB_HOST: "${DB_HOST:-db}"
      DB_NAME: "${DB_NAME:-lunadb}"
      DB_USER: "${DB_USER:-luna}"
      DB_PASS: "${DB_PASS:-luna}"
      # Canonical identity base — pins the /id/{slug} IRIs, JSON-LD @id, canonical links and sitemap so
      # they don't depend on the request Host ("freeze the URIs"). Empty = derive from the request
      # (fine on localhost). Set for any real/triplestore-backed deploy. See docs/configuration.md.
      SITE_URI: "${SITE_URI:-}"
      SPARQL_ENDPOINT: "${SPARQL_ENDPOINT:-http://sparql-proxy:7878/query}"
      SPARQL_UPDATE_ENDPOINT: "${SPARQL_UPDATE_ENDPOINT:-http://sparql-proxy:7878/update}"
      # Credentials presented to the proxy (demo defaults; override SPARQL_AUTH_PASS via .env).
      SPARQL_AUTH_USER: "${SPARQL_AUTH_USER:-luna}"
      SPARQL_AUTH_PASS: "${SPARQL_AUTH_PASS:-luna-sparql-dev}"
      SPARQL_READS: "${SPARQL_READS:-1}"
    # Wait for the DB to be *seeded and serving*, not merely started — otherwise the app comes up
    # and answers a degraded HTTP 200 while MySQL is still importing the seed (this is exactly the
    # readiness race that kept CI red). sparql-proxy only needs to have started.
    depends_on:
      db:
        condition: service_healthy
      sparql-proxy:
        condition: service_started

  db:
    image: mysql:8.0
    # Disable strict mode for the legacy MyISAM schema (pre-strict-mode column
    # defaults); use utf8mb4 (full Unicode) as the server default.
    command: --sql_mode="" --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lunadb
      MYSQL_USER: luna
      MYSQL_PASSWORD: luna
    # Healthy only once the seed import has created the content tables AND the real server accepts
    # TCP connections. Querying luna_nodes (a seeded table) proves the import finished — a plain
    # `mysqladmin ping` would pass against the entrypoint's temporary init server, before seeding.
    # `$$VAR` escapes compose interpolation so the container's own MYSQL_* env is used.
    healthcheck:
      test: ["CMD-SHELL", "mysql -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" \"$$MYSQL_DATABASE\" -e 'SELECT 1 FROM luna_nodes LIMIT 1' >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 20s
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - ./luna/luna.sql/luna.mysql.sql:/docker-entrypoint-initdb.d/luna.mysql.sql
      - db_data:/var/lib/mysql

  # Semantic-web layer (Phase A): a real SPARQL endpoint over the existing
  # MySQL via Ontop + an R2RML mapping. See docs/linked-data.md.
  ontop:
    build:
      context: ./semantic/ontop
      dockerfile: Dockerfile
    environment:
      ONTOP_MAPPING_FILE: /opt/ontop/input/mapping.ttl
      ONTOP_PROPERTIES_FILE: /opt/ontop/input/ontop.properties
      # CORS '*' and dev mode are for the local demo only — tighten/remove for any deploy.
      ONTOP_CORS_ALLOWED_ORIGINS: "*"
      ONTOP_DEV_MODE: "true"
    volumes:
      - ./semantic/ontop:/opt/ontop/input
    # No host port: the SPARQL endpoint is unauthenticated, so it stays on the internal
    # compose network (reachable by `app`), never the host/browser. Query it for dev with
    #   docker compose exec app curl -s http://ontop:8080/sparql --data-urlencode 'query=…'
    depends_on:
      - db

  # Semantic-web layer (Phase B): a real triplestore. Loaded out-of-band by
  # materialising the SAME R2RML mapping to N-Triples and POSTing them in (the
  # ontop materialize + curl steps in docs/linked-data.md). Flip the app's
  # SPARQL_ENDPOINT here and the read path is served by the triplestore instead
  # of MySQL — no app change.
  oxigraph:
    image: oxigraph/oxigraph
    command: ["serve", "--location", "/data", "--bind", "0.0.0.0:7878"]
    # No host port AND not on the `default` network: Oxigraph has no native auth and its
    # /update + /store accept unauthenticated writes, so it lives only on the internal
    # `triplestore` network, reachable solely by `sparql-proxy` — which demands HTTP basic
    # auth on every request. The app talks to the proxy, never to Oxigraph directly. This
    # closes both the CSRF-to-localhost write vector (B2) and the unauthenticated-write
    # vector. Dev queries go through the proxy with credentials:
    #   docker compose exec app curl -s -u "$SPARQL_AUTH_USER:$SPARQL_AUTH_PASS" \
    #     http://sparql-proxy:7878/query --data-urlencode 'query=ASK{}'
    networks:
      - triplestore
    volumes:
      - oxigraph_data:/data

  # Authenticating reverse proxy in front of Oxigraph — adds the HTTP basic auth the
  # triplestore lacks. Bridges the `default` network (where `app` lives) and the internal
  # `triplestore` network (Oxigraph only). The bcrypt hash is generated at startup from the
  # plaintext SPARQL_AUTH_PASS, so no password hash is committed. See
  # semantic/sparql-proxy/Caddyfile.
  sparql-proxy:
    image: caddy:2-alpine
    environment:
      SPARQL_AUTH_USER: "${SPARQL_AUTH_USER:-luna}"
      SPARQL_AUTH_PASS: "${SPARQL_AUTH_PASS:-luna-sparql-dev}"
    volumes:
      - ./semantic/sparql-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    command:
      - sh
      - -c
      - 'export SPARQL_AUTH_HASH="$$(caddy hash-password --plaintext "$$SPARQL_AUTH_PASS")"; exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile'
    networks:
      - default
      - triplestore
    depends_on:
      - oxigraph

volumes:
  db_data:
  oxigraph_data:

networks:
  default:
  # Oxigraph + the proxy only; `internal` = no egress, not reachable from `default`.
  triplestore:
    internal: true
