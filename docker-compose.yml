services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    # The read path is RDF-native by default: routing / ACL / texts are read from
    # Oxigraph (the materialised, dual-write-synced triplestore). Override to Ontop
    # to read live from MySQL through virtual SPARQL instead (no app change):
    #   SPARQL_ENDPOINT=http://ontop:8080/sparql docker-compose up -d app
    # or set SPARQL_READS=0 to bypass SPARQL entirely and read from SQL.
    environment:
      SPARQL_ENDPOINT: "${SPARQL_ENDPOINT:-http://oxigraph:7878/query}"
      SPARQL_READS: "${SPARQL_READS:-1}"
    depends_on:
      - db

  db:
    image: mysql:5.7
    # mysql:5.7 is amd64-only; force the platform so arm64 hosts emulate it.
    platform: linux/amd64
    # Disable strict mode for compatibility with legacy TYPE=MyISAM syntax
    command: --sql_mode="" --character-set-server=utf8 --collation-server=utf8_general_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lunadb
      MYSQL_USER: luna
      MYSQL_PASSWORD: luna
    ports:
      - "3307:3306"
    volumes:
      - ./luna/luna.sql/luna.mysql.sql:/docker-entrypoint-initdb.d/luna.mysql.sql
      - db_data:/var/lib/mysql

  # Semantic-web layer (Phase A): a real SPARQL endpoint over the existing
  # MySQL via Ontop + an R2RML mapping. See docs/linked-data.md.
  ontop:
    build:
      context: ./semantic/ontop
      dockerfile: Dockerfile
    environment:
      ONTOP_MAPPING_FILE: /opt/ontop/input/mapping.ttl
      ONTOP_PROPERTIES_FILE: /opt/ontop/input/ontop.properties
      # CORS '*' and dev mode are for the local demo only — tighten/remove for any deploy.
      ONTOP_CORS_ALLOWED_ORIGINS: "*"
      ONTOP_DEV_MODE: "true"
    volumes:
      - ./semantic/ontop:/opt/ontop/input
    ports:
      - "8081:8080"
    depends_on:
      - db

  # Semantic-web layer (Phase B): a real triplestore. Loaded out-of-band by
  # materialising the SAME R2RML mapping to N-Triples and POSTing them in (the
  # ontop materialize + curl steps in docs/linked-data.md). Flip the app's
  # SPARQL_ENDPOINT here and the read path is served by the triplestore instead
  # of MySQL — no app change.
  oxigraph:
    image: oxigraph/oxigraph
    command: ["serve", "--location", "/data", "--bind", "0.0.0.0:7878"]
    ports:
      - "7879:7878"
    volumes:
      - oxigraph_data:/data

volumes:
  db_data:
  oxigraph_data:
