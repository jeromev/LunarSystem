# Ontop JDBC connection to the docker-compose `db` service (MySQL 5.7).
# The connector-8 params keep MySQL 5.7 happy (no SSL, public key retrieval, TZ).
jdbc.url=jdbc:mysql://db:3306/lunadb?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
jdbc.user=luna
jdbc.password=luna
jdbc.driver=com.mysql.cj.jdbc.Driver

# Make Ontop default any column whose SQL type it can't infer to xsd:string.
# All our mapped literal columns (lid, title, content_html, lang, names) are
# strings, so this keeps untyped values from being dropped.
ontop.inferDefaultDatatype=true
